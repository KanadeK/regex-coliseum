name: Release
on:
  push:
    tags: ['v*']
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: npm }
      - run: npm ci
      - run: npm run lint && npm run typecheck && npm run test:coverage
      - run: npx playwright install --with-deps chromium && npm run test:e2e
      - run: npm run package
      - name: Publish verified assets
        env: { GH_TOKEN: '${{ github.token }}' }
        run: gh release create "${GITHUB_REF_NAME}" dist-release/*.zip dist-release/SHA256SUMS.txt --verify-tag --title "${GITHUB_REF_NAME}" --generate-notes
