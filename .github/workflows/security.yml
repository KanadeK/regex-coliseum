name: Security
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '21 4 * * 1'
permissions:
  contents: read
jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: npm }
      - run: npm ci
      - run: npm audit --omit=dev --audit-level=high
      - name: Scan tracked files for accidental private keys
        run: "! git grep -nE 'BEGIN( [A-Z]+)? PRIVATE KEY|AKIA[0-9A-Z]{16}'"
